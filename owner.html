<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم | كافتيريا الزيتونة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Reem+Kufi:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" style="display:none;">
  <div class="login-box">
    <h2>دخول صاحب الكافتيريا</h2>
    <div class="field">
      <label>الإيميل</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>كلمة السر</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="primary-btn" id="loginBtn">دخول</button>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <header>
    <h1 class="brand">لوحة الطلبات</h1>
    <p class="tagline">كافتيريا الزيتونة</p>
  </header>
  <div class="owner-wrap">
    <div class="owner-head">
      <h2>الطلبات الواردة</h2>
      <button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
    </div>
    <div id="ordersList"><div class="empty-state">جاري التحميل...</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>const auth = firebase.auth();</script>
<script src="owner.js"></script>
</body>
</html>
