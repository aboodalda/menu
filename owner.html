<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم | كافتيريا الزيتونة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Reem+Kufi:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" style="display:none;">
  <div class="login-box">
    <h2>دخول صاحب الكافتيريا</h2>
    <div class="field">
      <label>الإيميل</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>كلمة السر</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="primary-btn" id="loginBtn">دخول</button>
  </div>
</div>

<div id="dashboard" style="display:none;">
  <header>
    <h1 class="brand">لوحة التحكم</h1>
    <p class="tagline">كافتيريا الزيتونة</p>
  </header>

  <div class="owner-tabs">
    <button id="tabOrdersBtn" class="active">📋 الطلبات</button>
    <button id="tabMenuBtn">🍽️ إدارة المنيو</button>
  </div>

  <div class="owner-wrap">
    <div class="owner-head">
      <h2 id="panelTitle">الطلبات الواردة</h2>
      <button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
    </div>

    <!-- ===== لوحة الطلبات ===== -->
    <div id="ordersPanel">
      <div class="filter-chips" id="filterChips">
        <button data-status="all" class="active">الكل</button>
        <button data-status="جديد">جديد</button>
        <button data-status="قيد التحضير">قيد التحضير</button>
        <button data-status="جاهز للتسليم">جاهز للتسليم</button>
        <button data-status="تم التسليم">تم التسليم</button>
      </div>
      <div id="ordersList"><div class="empty-state">جاري التحميل...</div></div>
    </div>

    <!-- ===== لوحة إدارة المنيو ===== -->
    <div id="menuPanel" style="display:none;">
      <button class="seed-btn" id="seedBtn">📥 تحميل قائمة تجريبية (استخدمها مرة وحدة بس لو المنيو فاضي)</button>
      <button class="add-item-btn" id="addItemBtn">+ إضافة صنف جديد</button>
      <div id="adminItemsList"><div class="empty-state">جاري التحميل...</div></div>
    </div>
  </div>
</div>

<!-- نافذة إضافة / تعديل صنف -->
<div class="overlay" id="itemEditOverlay">
  <div class="sheet">
    <h2 id="itemEditTitle">إضافة صنف جديد</h2>
    <div class="field">
      <label>اسم الصنف</label>
      <input type="text" id="itemName" placeholder="مثال: كنافة نابلسية">
    </div>
    <div class="field">
      <label>القسم</label>
      <select id="itemCategory" style="width:100%; padding:11px 12px; border:1px solid var(--wood-mid); border-radius:10px; font-family:'Tajawal',sans-serif; font-size:.9rem; background:#fff;"></select>
    </div>
    <div class="field">
      <label>السعر (₪)</label>
      <input type="number" id="itemPrice" placeholder="20">
    </div>
    <div class="field">
      <label>السعر الأصلي قبل الخصم (اختياري — لعمل عرض)</label>
      <input type="number" id="itemOldPrice" placeholder="اتركه فاضي إذا مافي خصم">
    </div>
    <div class="field">
      <label>رابط صورة الصنف (اختياري)</label>
      <input type="text" id="itemImg" placeholder="https://...">
    </div>
    <div class="field">
      <label>شارة مميزة (اختياري)</label>
      <input type="text" id="itemBadge" placeholder="مثال: 🔥 الأكثر طلبًا">
    </div>
    <div class="field" style="display:flex; align-items:center; justify-content:space-between;">
      <label style="margin:0;">متوفر حاليًا</label>
      <label class="toggle-switch"><input type="checkbox" id="itemAvailable" checked><span class="slider"></span></label>
    </div>
    <div class="error-msg" id="itemEditError"></div>
    <button class="primary-btn" id="saveItemBtn">حفظ</button>
    <button class="ghost-btn" id="deleteItemBtn" style="color:#a33;">حذف الصنف نهائيًا</button>
    <button class="ghost-btn" id="closeItemEdit">إلغاء</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>const auth = firebase.auth();</script>
<script src="owner.js"></script>
</body>
</html>
